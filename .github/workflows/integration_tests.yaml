---
name: Integration tests

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
  - cron: 0 0 * * *

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.generate-versions.outputs.versions }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: 0.11.7
        enable-cache: true
        cache-dependency-glob: |
          requirements.test
          requirements.test.in
          requirements.constraints
    - name: Install dependencies
      run: |
        uv venv
        uv pip sync --python .venv --strict requirements.test
    - name: Generate versions
      id: generate-versions
      run: |
        .venv/bin/python .github/get_versions.py >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-24.04
    needs: [generate_versions]
    strategy:
      matrix:
        ha_version: ${{ fromJSON(needs.generate_versions.outputs.versions) }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: .python-version
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: 0.11.7
        enable-cache: true
        cache-dependency-glob: |
          requirements.test
          requirements.test.in
          requirements.constraints
    - name: Install dependencies
      run: |
        uv venv
        uv pip sync --python .venv --strict requirements.test
    - name: Integration tests (${{ matrix.ha_version}})
      run: cd integration_tests && ../.venv/bin/python test_banning_works.py
      env:
        HA_VERSION: ${{ matrix.ha_version}}

  # No real steps, just a meta-step to wait for all test steps
  finish:
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
