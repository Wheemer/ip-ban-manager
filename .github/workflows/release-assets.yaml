---
name: Release assets

on:
  release:
    types:
    - published

permissions:
  contents: write

jobs:
  upload-hacs-zip:
    name: Upload HACS zip
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.tag_name }}
    - name: Build HACS release zip
      run: |
        cd custom_components/ip_ban_manager
        zip -r "${GITHUB_WORKSPACE}/ip-ban-manager.zip" . -x '*/__pycache__/*' '*/__pycache__' '__pycache__/*' '__pycache__' '*.pyc'
    - name: Validate HACS release zip
      run: |
        python scripts/validate_hacs_zip.py ip-ban-manager.zip
    - name: Upload release asset
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "${{ github.event.release.tag_name }}" ip-ban-manager.zip --clobber
