---
name: HA

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
  - cron: 0 0 * * *

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ha:
    name: Hassfest
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: home-assistant/actions/hassfest@master
