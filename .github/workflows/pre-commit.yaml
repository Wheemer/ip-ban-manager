---
name: pre-commit

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Install asdf & tools
      uses: asdf-vm/actions/install@v4
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -r requirements.test
    - name: pre-commit
      run: .venv/bin/pre-commit run -a
