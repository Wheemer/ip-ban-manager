---
name: HACS

on:
  push:
    branches:
    - main
  pull_request:
  schedule:
  - cron: 0 0 * * *

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: HACS Action
      uses: hacs/action@main
      with:
        category: integration
        ignore: brands
